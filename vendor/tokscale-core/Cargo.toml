# Vendored from https://github.com/junhoyeo/tokscale (crates/tokscale-core).
# Workspace inheritance was flattened so this builds standalone as a path
# dependency inside TokenBar. Dependency versions mirror tokscale's root
# [workspace.dependencies]; bump them together when re-vendoring upstream.
[package]
name = "tokscale-core"
version = "3.0.0"
edition = "2021"
authors = ["Junho Yeo <hello@junho.io>"]
license = "MIT"
repository = "https://github.com/junhoyeo/tokscale"
description = "Core library for tokscale - session parsing, scanning, aggregation, pricing"

[lib]
crate-type = ["rlib"]

[dependencies]
rayon = "1.10"
simd-json = "0.14"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
walkdir = "2"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
# rustls instead of native-tls-vendored — vendored OpenSSL needs Perl+NASM on
# Windows builds (CI runners ship them; local dev boxes often don't) and is
# the slowest unit in a clean build. 0.13's `rustls` feature verifies via
# rustls-platform-verifier (Security.framework on macOS, SChannel on Windows),
# so scoped Keychain trust, corporate MITM roots, and AIA chain fetching all
# keep native semantics. Matches tb_core_ffi's reqwest line exactly.
reqwest = { version = "0.13", features = ["json", "rustls"], default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync", "fs"] }
dirs = "5"
once_cell = "1"
rusqlite = { version = "0.32", features = ["bundled"] }
zstd = "0.13"
tracing = "0.1"
sha2 = "0.10"
libc = "0.2"
fs2 = "0.4"

[dev-dependencies]
tempfile = "3"
serial_test = "3"
