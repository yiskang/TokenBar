name: CI

# The app build/test pipeline. Skips landing-only changes — those have their
# own pages.yml deploy and don't touch the Rust/Swift app.
on:
  push:
    branches: [main]
    paths-ignore: ['landing/**']
  pull_request:
    paths-ignore: ['landing/**']

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Validate knowledge contracts
        run: python3 scripts/check_knowledge.py

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build Rust staticlib
        run: cargo build --release

      - name: Build Swift package
        run: swift build

      - name: Core logic selftest
        run: swift run TokenBar --selftest

      - name: FFI smoke test
        run: swift run TokenBar --smoke
