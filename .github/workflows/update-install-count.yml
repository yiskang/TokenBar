name: Update install count

# Note: `release: published` never fires for our own releases — they are
# created by release.yml with the default GITHUB_TOKEN, whose events do not
# trigger workflows (recursion guard). release.yml dispatches this workflow
# explicitly instead (workflow_dispatch is exempt from that guard), and the
# daily cron keeps the count fresh between releases.
on:
  release:
    types: [published]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute download count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh api repos/Nanako0129/TokenBar/releases \
            --jq '[.[].assets[] | select(.name | test("\\.(tar\\.gz|dmg|zip|pkg)$")) | .download_count] | add // 0')
          echo "{\"schemaVersion\":1,\"label\":\"installs\",\"message\":\"${COUNT}\",\"color\":\"brightgreen\"}" \
            > docs/install-count.json

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/install-count.json
          if git diff --staged --quiet; then
            echo "count unchanged"
            exit 0
          fi
          git commit -m "chore: update install count"
          # main may have moved (e.g. the appcast commit lands right after a
          # release) — rebase our one commit instead of failing the push.
          git pull --rebase origin main
          git push
