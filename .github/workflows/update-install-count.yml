name: Update install count

# Note: `release: published` never fires for our own releases — they are
# created by release.yml with the default GITHUB_TOKEN, whose events do not
# trigger workflows (recursion guard). release.yml dispatches this workflow
# explicitly instead (workflow_dispatch is exempt from that guard), and the
# daily cron keeps the count fresh between releases.
on:
  release:
    types: [published]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # The badge JSON lives on a standalone `badges` branch, NOT on main, so
      # these chore updates never spam main's history. The branch is rebuilt
      # from scratch and force-pushed every run, so it always holds exactly one
      # commit. Shields reads it via the raw URL for the `badges` ref.
      - name: Compute and publish download count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh api repos/Nanako0129/TokenBar/releases \
            --jq '[.[].assets[] | select(.name | test("\\.(tar\\.gz|dmg|zip|pkg)$")) | .download_count] | add // 0')
          JSON="{\"schemaVersion\":1,\"label\":\"installs\",\"message\":\"${COUNT}\",\"color\":\"brightgreen\"}"

          # Build the orphan branch in an isolated repo so the workspace tree is
          # untouched and the branch carries a single commit, no shared history.
          WORK="$(mktemp -d)"
          cd "$WORK"
          git init -q -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          printf '%s' "$JSON" > install-count.json
          git add install-count.json
          git commit -q -m "chore: update install count"
          git push -f \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            badges
