name: Deploy landing page

# Builds the Astro site in landing/ and publishes it to GitHub Pages. Runs only
# when the landing site changes (or manually), independent of the app's CI and
# release pipelines.
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate knowledge contracts
        run: python3 scripts/check_knowledge.py
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: landing
      - name: Build site
        run: npm run build
        working-directory: landing
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://tokenbar.nyanako.com' }}
      - if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
